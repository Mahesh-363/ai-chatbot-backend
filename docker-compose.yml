version: "3.9"

x-common-env: &common-env
  DJANGO_SETTINGS_MODULE: config.settings.development
  SECRET_KEY: dev-secret-key-change-in-production
  DEBUG: "True"
  ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
  DB_NAME: ai_chatbot
  DB_USER: chatbot_user
  DB_PASSWORD: chatbot_pass
  DB_HOST: postgres
  DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/0
  REDIS_RATE_LIMIT_URL: redis://redis:6379/1
  REDIS_SESSION_URL: redis://redis:6379/2
  CELERY_BROKER_URL: redis://redis:6379/3
  CELERY_RESULT_BACKEND: redis://redis:6379/4
  OPENAI_API_KEY: ${OPENAI_API_KEY:-your-openai-key-here}
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_chatbot
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: chatbot_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot_user -d ai_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Django API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    environment:
      <<: *common-env
    command: sh -c "python manage.py makemigrations accounts chat analytics --noinput && python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60 --reload"
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker (AI Processing) ────────────────────────────────────────────
  celery_ai:
    build:
      context: .
      target: runtime
    environment:
      <<: *common-env
    command: celery -A config worker -Q ai_processing -c 4 -l info --prefetch-multiplier=1
    volumes:
      - .:/app
    depends_on:
      - api
      - redis
    restart: unless-stopped

  # ── Celery Worker (Background Tasks) ─────────────────────────────────────────
  celery_background:
    build:
      context: .
      target: runtime
    environment:
      <<: *common-env
    command: celery -A config worker -Q background,analytics,default -c 2 -l info
    volumes:
      - .:/app
    depends_on:
      - api
      - redis
    restart: unless-stopped

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      target: runtime
    environment:
      <<: *common-env
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      - api
      - redis
    restart: unless-stopped

  # ── Flower (Celery Monitor) ───────────────────────────────────────────────────
  flower:
    build:
      context: .
      target: runtime
    environment:
      <<: *common-env
      FLOWER_BASIC_AUTH: "admin:admin123"
    command: celery -A config flower --port=5555 --basic-auth=admin:admin123
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/static:ro
      - media_files:/media:ro
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
